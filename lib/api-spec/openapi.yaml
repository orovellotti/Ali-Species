openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TAXREF taxonomy browser API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: taxons
    description: Taxon operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /status-types:
    get:
      operationId: listStatusTypes
      tags: [taxons]
      summary: List BDC status types with taxon counts
      responses:
        "200":
          description: List of status types
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [code, label, taxa]
                  properties:
                    code:
                      type: string
                    label:
                      type: string
                    taxa:
                      type: integer
  /territoires:
    get:
      operationId: listTerritoires
      tags: [taxons]
      summary: List régions and départements with status counts
      responses:
        "200":
          description: List of territories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [lb, cd_sig, niveau, taxa]
                  properties:
                    lb:
                      type: string
                    cd_sig:
                      type: string
                    niveau:
                      type: string
                    taxa:
                      type: integer
  /taxons/search:
    get:
      operationId: searchTaxons
      tags: [taxons]
      summary: Search taxons with autocomplete
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (name or vernacular name)
        - name: regne
          in: query
          required: false
          schema:
            type: string
          description: Filter by kingdom
        - name: territoire
          in: query
          required: false
          schema:
            type: string
          description: Filter by territory cd_sig (e.g. INSEER52 region or INSEED69 département)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Max results
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonSummary"
  /taxons/random:
    get:
      operationId: getRandomTaxon
      tags: [taxons]
      summary: Get a random species
      responses:
        "200":
          description: A random species with vernacular name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonSummary"
  /taxons/{cdNom}:
    get:
      operationId: getTaxon
      tags: [taxons]
      summary: Get taxon details
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: Taxon details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonDetail"
        "404":
          description: Taxon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /taxons/{cdNom}/children:
    get:
      operationId: getTaxonChildren
      tags: [taxons]
      summary: Get children taxa
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM of parent taxon
      responses:
        "200":
          description: Children taxa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonSummary"
  /taxons/{cdNom}/classification:
    get:
      operationId: getTaxonClassification
      tags: [taxons]
      summary: Get full classification hierarchy
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: Classification path from root to taxon
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxonSummary"
  /taxons/stats:
    get:
      operationId: getTaxonStats
      tags: [taxons]
      summary: Get taxonomy statistics
      responses:
        "200":
          description: Statistics about the database
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonStats"
  /taxons/{cdNom}/statuts:
    get:
      operationId: getTaxonStatuts
      tags: [taxons]
      summary: Get BDC conservation statuts for a taxon
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: List of conservation statuts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BdcStatut"
  /taxons/{cdNom}/wikipedia:
    get:
      operationId: getTaxonWikipedia
      tags: [taxons]
      summary: Get Wikipedia extract for a taxon
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: Wikipedia extract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WikipediaInfo"
  /taxons/{cdNom}/gbif:
    get:
      operationId: getTaxonGbif
      tags: [taxons]
      summary: Get GBIF data for a taxon
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: GBIF data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GbifInfo"
  /taxons/{cdNom}/bhl:
    get:
      operationId: getTaxonBhl
      tags: [taxons]
      summary: Get Biodiversity Heritage Library references for a taxon
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: BHL references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BhlInfo"
        "503":
          description: BHL API key not configured on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BhlInfo"
  /taxons/{cdNom}/media:
    get:
      operationId: getTaxonMedia
      tags: [taxons]
      summary: Get media for a taxon from INPN
      parameters:
        - name: cdNom
          in: path
          required: true
          schema:
            type: integer
          description: CD_NOM identifier
      responses:
        "200":
          description: Media URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxonMedia"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TaxonSummary:
      type: object
      properties:
        cdNom:
          type: integer
        cdRef:
          type: integer
        lbNom:
          type: string
        nomVern:
          type: string
          nullable: true
        rang:
          type: string
          nullable: true
        famille:
          type: string
          nullable: true
        regne:
          type: string
          nullable: true
      required:
        - cdNom
        - cdRef
        - lbNom
    TaxonDetail:
      type: object
      properties:
        cdNom:
          type: integer
        cdRef:
          type: integer
        cdSup:
          type: integer
          nullable: true
        regne:
          type: string
          nullable: true
        phylum:
          type: string
          nullable: true
        classe:
          type: string
          nullable: true
        ordre:
          type: string
          nullable: true
        famille:
          type: string
          nullable: true
        group1Inpn:
          type: string
          nullable: true
        group2Inpn:
          type: string
          nullable: true
        group3Inpn:
          type: string
          nullable: true
        rang:
          type: string
          nullable: true
        lbNom:
          type: string
        lbAuteur:
          type: string
          nullable: true
        nomComplet:
          type: string
          nullable: true
        nomValide:
          type: string
          nullable: true
        nomVern:
          type: string
          nullable: true
        nomVernEng:
          type: string
          nullable: true
        habitat:
          type: string
          nullable: true
        fr:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
      required:
        - cdNom
        - cdRef
        - lbNom
    TaxonMedia:
      type: object
      properties:
        images:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              title:
                type: string
                nullable: true
              author:
                type: string
                nullable: true
            required:
              - url
      required:
        - images
    TaxonStats:
      type: object
      properties:
        totalTaxons:
          type: integer
        totalSpecies:
          type: integer
        totalGenera:
          type: integer
        totalFamilies:
          type: integer
        totalStatuts:
          type: integer
        kingdomCounts:
          type: array
          items:
            type: object
            properties:
              regne:
                type: string
              count:
                type: integer
            required:
              - regne
              - count
      required:
        - totalTaxons
        - totalSpecies
        - totalGenera
        - totalFamilies
        - totalStatuts
        - kingdomCounts
    BdcStatut:
      type: object
      properties:
        cdTypeStatut:
          type: string
        lbTypeStatut:
          type: string
          nullable: true
        regroupementType:
          type: string
          nullable: true
        codeStatut:
          type: string
          nullable: true
        labelStatut:
          type: string
          nullable: true
        rqStatut:
          type: string
          nullable: true
        cdSig:
          type: string
          nullable: true
        lbAdmTr:
          type: string
          nullable: true
        niveauAdmin:
          type: string
          nullable: true
        fullCitation:
          type: string
          nullable: true
        docUrl:
          type: string
          nullable: true
      required:
        - cdTypeStatut
    WikipediaInfo:
      type: object
      properties:
        extract:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
    GbifInfo:
      type: object
      properties:
        gbifKey:
          type: integer
          nullable: true
        occurrenceCount:
          type: integer
          nullable: true
        iucnCategory:
          type: string
          nullable: true
        iucnCategoryLabel:
          type: string
          nullable: true
        gbifUrl:
          type: string
          nullable: true
        distributionCountries:
          type: array
          items:
            type: string
          nullable: true
    BhlReference:
      type: object
      properties:
        itemId:
          type: integer
          nullable: true
        titleId:
          type: integer
          nullable: true
        title:
          type: string
        authors:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        url:
          type: string
        bhlType:
          type: string
          nullable: true
      required:
        - title
        - url
    BhlInfo:
      type: object
      properties:
        scientificName:
          type: string
          nullable: true
        references:
          type: array
          items:
            $ref: "#/components/schemas/BhlReference"
        source:
          type: string
          nullable: true
        fetchedAt:
          type: string
          nullable: true
        unavailable:
          type: boolean
          nullable: true
        message:
          type: string
          nullable: true
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
